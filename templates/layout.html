<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto-Credential Verifier</title>
    <!-- Modern Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Modern, dark, elegant colors */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navbar style header */
        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header a {
            color: var(--text-main);
            text-decoration: none;
        }

        /* Container */
        .container {
            max-width: 700px;
            width: 100%;
            padding: 50px 20px;
            box-sizing: border-box;
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Glassmorphism Card Element */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            text-align: center;
        }

        /* Typography spacing */
        h2 {
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        /* Forms styles */
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        input[type="text"], input[type="password"], input[type="file"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus, input[type="file"]:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        /* Custom file input styling */
        input[type="file"]::file-selector-button {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 15px;
            transition: all 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-blue { background: var(--accent-blue); }
        .btn-blue:hover { background: var(--accent-blue-hover); }

        .btn-green { background: var(--accent-green); }
        .btn-green:hover { background: var(--accent-green-hover); }

        .btn-back {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            margin-top: 25px;
            width: auto;
            padding: 10px 20px;
            font-size: 0.9rem;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Alerts and Results Styling */
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            font-weight: 500;
            line-height: 1.5;
            animation: fadeIn 0.4s ease-out forwards;
            text-align: left;
            word-break: break-all;
        }
        
        .result-success {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399; /* soft green */
        }

        .result-error {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171; /* soft red */
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 35px;
        }
        .nav-links .btn {
            width: auto;
            padding: 16px 36px;
            font-size: 1.05rem;
            margin-top: 0;
            flex: 1;
        }
        
        @media (max-width: 600px) {
            .nav-links { flex-direction: column; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <!-- The header updates dynamically based on the portal you are in -->
        <h1><a href="{{ home_url|default('/') }}">{{ site_name|default('🎓 BlockVerify') }}</a></h1>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
